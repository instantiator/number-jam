name: Run tests

on:
  workflow_call:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm test

  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Enable BuildKit so the GHA cache backend is available.
      - uses: docker/setup-buildx-action@v3

      # Build the OpenALPR image, using GitHub Actions cache to avoid
      # rebuilding unchanged layers on every run.
      - uses: docker/build-push-action@v6
        with:
          context: docker/
          tags: number-jam-alpr:latest
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Cache downloaded fixture files. The key is tied to the download
      # script so the cache is invalidated when fixtures change.
      - uses: actions/cache@v4
        with:
          path: tests/fixtures
          key: fixtures-${{ hashFiles('scripts/download-fixtures.ts') }}

      - run: npm run download-fixtures

      - run: npm run test:integration
